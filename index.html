<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            overflow: hidden;
            position: relative;
        }
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
            opacity: 0.7;
            bottom: -50px;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            border: 2px solid #ffb3c1;
            z-index: 10;
        }
        h2 { color: #ff4d6d; font-size: 28px; margin-bottom: 30px; }
        button {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        #yes-btn { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; }
        #no-btn { background: linear-gradient(135deg, #ff4d6d, #ff758f); color: white; position: relative; }
        .whatsapp-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 500);
    </script>

    <div class="container" id="main-container">
        <h2>Do you love me? 🥺❤️</h2>
        <button id="yes-btn" onclick="showLoveButton()">Yes, I do! 😍</button>
        <button id="no-btn" onmouseover="moveNoButton()">No 💔</button>
    </div>

    <script>
        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function showLoveButton() {
            const container = document.getElementById('main-container');
            const phoneNumber = "0718908286";
            const whatsappLink = `https://wa.me/${phoneNumber}?text=I%20love%20you%20baby`;
            container.innerHTML = `
                <h2>Thank you! My heart is yours! 🥰❤️</h2>
                <p style="font-size: 50px; margin: 10px 0;">💖✨🤴👸✨💖</p>
                <a href="${whatsappLink}" target="_blank" class="whatsapp-link">Click here to send WhatsApp 💬</a>
            `;
        }
    </script>
</body>
</html>
